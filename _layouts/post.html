---
layout: default
---

<div class="post">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <h1 class="post-title">{{ page.title }}</h1>
  <i class="fa fa-calendar" aria-hidden="true"></i>
  <span class="font-date"> Date:{{ page.date | date : "%Y.%m.%d" }}</span><br></br>

  <aside class="sidebar__right sticky" style="height: auto !important;">
    <div class="toc">
      {% include toc.html html=content %}
    </div>
  </aside>

  {% if post.categories == "Programmers" %}
    {% include post_programmers.html %}
  {% else %}
    {% include post_default.html %}
  {% endif %}
