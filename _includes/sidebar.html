<!-- Target for toggling the sidebar `.sidebar-checkbox` is for regular
     styles, `#sidebar-checkbox` for behavior. -->
     <input type="checkbox" class="sidebar-checkbox" id="sidebar-checkbox">

     <!-- Toggleable sidebar -->
     <div class="sidebar" id="sidebar"><!-- 배경크기가 맘에안들면 css card수정하면됌 sidebar부분 style="background-image: url({{ site.url }}{{ site.sidebar_img }});"  -->
       <div class="sidebar-item">
         <img class = "me" src="{{ site.url }}{{ site.author.avatar }}" alt ='d'/>
         <p class="font-Noto_Serif_KR">{{ site.description }}</p>
       </div>
